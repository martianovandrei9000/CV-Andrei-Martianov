stopwords:
  # personal-stopwords: per-user, fully editable via /blacklist.
  # universal-stopwords: deploy-time baseline copied into the user's CV YAML.
  # Words formerly here that belonged to the four DNA-level groups
  # (Госсектор, Преподаватели, Спам, Доставка) have been moved out — they
  # are now enforced platform-wide via stopword_groups.is_absolute = TRUE
  # and applied independently of any user YAML or env var. See
  # docs/company-values.md and docs/stopword-filtering.md. What remains
  # below is the unpaid-work / starter-only baseline, which IS user-visible
  # and user-removable.
  personal-stopwords: []
  universal-stopwords: ["intern", "revenue share", "unpaid", "equity only", "за процент", "доля от прибыли", "доля от выручки", "процент с продаж", "интерн", "сотрудничество", "стажер", "стажёр"]

